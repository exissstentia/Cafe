        color: var(--ink-light);

        font-family: 'DM Sans', sans-serif;

</style>

</head>
<body>

<div class="header">
    <div class="header-row">
        <div>
            <div class="header-label">Сводный лист</div>
            <h1>За<em>явка</em></h1>
        </div>
        <button class="btn-reset" onclick="resetAll()">Очистить</button>
    </div>
    <div class="header-divider">
        <div class="header-divider-line"></div>
        <div class="header-divider-dot"></div>
    </div>
</div>

<div id="app"></div>

<div class="float-btn-container">
    <button class="main-btn" onclick="copyOrder()" id="copyBtn">
        <span class="main-btn-icon">✦</span>
        Скопировать заявку
    </button>
</div>

<script>
    const ICONS = ["🍰", "🥧", "🥐"];

    const categories = [
        {
            title: "Десерты",
            items: [
                "Ангельский рулет", "Амаретти", "Вафля со сгущёнкой", "Имбирное печенье",
                "Картошка", "Муравейник", "Три шоколада", "Сырники",
                "Тарталетка карамельная", "Тарталетка цитрусовая", "Медовик",
                "Рубленный", "Сникерс", "Чизкейк топленое молоко",
                "Чизкейк сникерс", "Эклер со сгущёнкой", "Эклер шоколадный"
            ]
        },
        {
            title: "Пироги",
            items: ["Капуста-мясо", "Яблоко-брусника", "Горбуша и брокколи", "Курица и грибы", "Творожный"]
        },
        {
            title: "Выпечка и Кухня",
            items: [
                "Лапша", "Круассан классический", "Тесто для пасты", "Основа",
                "Слойка: Курица и грибы", "Слойка: Ветчина и сыр", "Слойка: Горбуша",
                "Сосиски в тесте", "Свинина карбонад соломка",
                "Биточек куриный", "Домашняя котлета", "Бриошь", "Сахар", "Мёд"
            ]
        }
    ];

    function countSelected(catIdx) {
        let n = 0;
        categories[catIdx].items.forEach((_, iIdx) => {
            const val = localStorage.getItem(`p-${catIdx}-${iIdx}`);
            if (val && parseFloat(val.replace(',', '.')) > 0) n++;
        });
        return n;
    }

    function render() {
        const app = document.getElementById('app');
        let html = '';

        categories.forEach((cat, catIdx) => {
            const sel = countSelected(catIdx);
            html += `
            <div class="category-title">
                <div class="category-icon">${ICONS[catIdx] || '🍽'}</div>
                <span class="category-label">${cat.title}</span>
                ${sel > 0 ? `<span class="category-count">${sel} выбрано</span>` : ''}
            </div>
            <div class="ios-card">`;

            cat.items.forEach((item, itemIdx) => {
                const id = `p-${catIdx}-${itemIdx}`;
                let val = localStorage.getItem(id) || "";
                val = val.replace('.', ',');
                const isSelected = val !== "" && parseFloat(val.replace(',', '.')) > 0;

                html += `
                <div class="row ${isSelected ? 'selected' : ''}" id="row-${id}">
                    <div class="name">${item}</div>
                    <div class="controls">
                        <button class="btn" onclick="step('${id}', -1)">−</button>
                        <input type="text" inputmode="decimal" class="qty" id="${id}" value="${val}"
                               placeholder="0" oninput="handleInput('${id}', this.value)" onblur="formatInput('${id}')">
                        <button class="btn" onclick="step('${id}', 1)">+</button>
                    </div>
                </div>`;
            });
            html += `</div>`;
        });

        app.innerHTML = html;
    }

    window.handleInput = function(id, value) {
        const validValue = value.replace(/[^0-9.,]/g, '');
        const el = document.getElementById(id);
        if (value !== validValue) el.value = validValue;
        save(id, validValue);
    };

    window.formatInput = function(id) {
        let val = document.getElementById(id).value;
        if (!val) return;
        val = val.replace('.', ',');
        document.getElementById(id).value = val;
    };

    window.step = function(id, delta) {
        const el = document.getElementById(id);
        let current = parseFloat(el.value.replace(',', '.')) || 0;
        let next = Math.round((current + delta) * 10) / 10;

        if (next <= 0) {
            el.value = "";
            save(id, "");
        } else {
            el.value = next.toString().replace('.', ',');
            save(id, el.value);
        }
    };

    function save(id, value) {
        const row = document.getElementById(`row-${id}`);
        const numVal = parseFloat(value.replace(',', '.'));

        if (numVal > 0) {
            localStorage.setItem(id, value);
            row.classList.add('selected');
        } else {
            localStorage.removeItem(id);
            if (!value) row.classList.remove('selected');
        }
        // Refresh counts
        render();
    }

    window.copyOrder = function() {
        let text = "";
        let hasItems = false;

        categories.forEach((cat, cIdx) => {
            let catItems = "";
            cat.items.forEach((item, iIdx) => {
                const id = `p-${cIdx}-${iIdx}`;
                let val = localStorage.getItem(id);
                if (val) {
                    val = val.replace('.', ',');
                    catItems += `${item}: ${val}\n`;
                    hasItems = true;
                }
            });
            if (catItems) {
                text += `\n🔹 ${cat.title}\n${catItems}`;
            }
        });

        if (!hasItems) { alert("Список пуст"); return; }
        text = text.trim();

        navigator.clipboard.writeText(text).then(() => {
            const btn = document.getElementById('copyBtn');
            btn.innerHTML = `<span class="main-btn-icon">✓</span> Скопировано!`;
            btn.classList.add('success');
            setTimeout(() => {
                btn.innerHTML = `<span class="main-btn-icon">✦</span> Скопировать заявку`;
                btn.classList.remove('success');
            }, 2200);
        });
    };

    window.resetAll = function() {
        if (localStorage.length === 0) return;
        if (confirm("Точно очистить весь список?")) {
            localStorage.clear();
            render();
            if (navigator.vibrate) navigator.vibrate(10);
        }
    };

    render();
</script>

</body>
</html>
